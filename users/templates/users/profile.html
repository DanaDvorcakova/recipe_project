{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <!-- Left: Profile Image & Info -->
        <div class="col-md-4 text-center mb-4">
            <img class="rounded-circle shadow" src="{{ user.profile.image.url }}" 
                 alt="{{ user.username }}" style="width: 180px; height: 180px; object-fit: cover;">
            <h2 class="mt-3">{{ user.username }}</h2>
            <p class="text-muted">{{ user.email }}</p>
        </div>

        <!-- Right: Profile Form -->
        <div class="col-md-8">
            <div class="card shadow-sm p-4">
                <h4 class="mb-4">Update Profile</h4>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ u_form|crispy }}
                    {{ p_form|crispy }}
                    <button class="btn btn-info mt-3" type="submit">Update</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
