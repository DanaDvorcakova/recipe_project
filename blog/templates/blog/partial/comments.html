<div class="card mb-3 shadow-sm comment-box rounded-3" style="background-color:#f8f9fa;">
    <div class="card-body p-3">

        <div class="d-flex align-items-center justify-content-between mb-2">

            <div class="d-flex align-items-center">

                <img src="{% if comment.user.profile %}{{ comment.user.profile.image.url }}{% else %}/media/default_images/default_profile.jpg{% endif %}" 
                     alt="{{ comment.user.username }}'s profile"
                     class="rounded-circle me-2 border comment-avatar"
                     style="width:45px;height:45px;object-fit:cover;">

                <div class="fw-bold text-primary">
                    {{ comment.user.username }}
                </div>

            </div>

            <small class="text-muted">
                {{ comment.date_posted|date:"M d, Y H:i" }}
            </small>

        </div>

        <p class="mb-0 comment-text">
            {{ comment.content }}
        </p>

    </div>
</div>
