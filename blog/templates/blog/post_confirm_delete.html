{% extends "blog/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white text-center">
                    <h4 class="mb-0">Delete Post</h4>
                </div>
                <div class="card-body">
                    {% if messages %}
                        <div class="container mt-3">
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show auto-dismiss" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                    <h5 class="text-center text-danger mb-4">
                        Are you sure you want to delete the post <strong>"{{ object.title }}"</strong>?
                    </h5>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-around">
                            <button class="btn btn-danger" type="submit">Yes, Delete</button>
                            <a class="btn btn-secondary" href="{% url 'post-detail' object.id %}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
